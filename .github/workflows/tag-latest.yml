name: Tag image as latest

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source image tag in GHCR to mark as latest (e.g. dev, sha-abc1234)"
        required: true
        default: dev

permissions:
  contents: read
  packages: write

jobs:
  tag-latest:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image as latest
        env:
          SRC: ${{ inputs.source }}
        run: |
          docker buildx imagetools create -t "$IMAGE:latest" "$IMAGE:$SRC"
