version: 1
campaign:
  name: Sample
  description: |
    A small starter library that demonstrates every shape: traits with
    modifiers, skills with situational modifiers, items with armor and
    weapon data.  Suitable as a smoke-test fixture and a starting point
    for new campaigns.
  pointTarget: 150
  disadvantageCap: 50
  quirkCap: 5
library:
  traits:
    - name: Combat Reflexes
      kind: advantage
      basePoints: 15
      description: |
        +1 to all active defenses, +1 to Fast-Draw, +2 to Fright
        Checks, +6 to wake up or recover from surprise.  Never freezes
        on a critical failure.
      source: B-43
      tags: [combat]
    - name: Bad Temper
      kind: disadvantage
      basePoints: -10
      description: Frequent self-control rolls when provoked.
      source: B-124
      availableModifiers:
        - name: Mitigator (-50%)
          category: limitation
          costType: percent
          costValue: -50
          description: Reduce social impact through training, ritual, or medication.
    - name: Honesty
      kind: disadvantage
      basePoints: -10
      source: B-138
      availableModifiers:
        - name: Self-Control 15
          category: limitation
          costType: percent
          costValue: -50
          group: self-control
        - name: Self-Control 12
          category: limitation
          costType: percent
          costValue: 0
          group: self-control
        - name: Self-Control 9
          category: limitation
          costType: percent
          costValue: 50
          group: self-control
        - name: Self-Control 6
          category: limitation
          costType: percent
          costValue: 100
          group: self-control
    - name: Curious
      kind: quirk
      basePoints: -1
      source: B-162
    - name: Native Tongue (Common)
      kind: language
      basePoints: 0
      source: B-23
    - name: Magery
      kind: advantage
      basePoints: 5
      description: |
        The base supernatural prerequisite for spellcasting.  Magery 0
        unlocks the ability to cast at all in a normal-mana zone (5
        points).  Each level above 0 costs 10 points and adds +1 to
        every spell skill, plus reduces learning time.  Some spells
        require a minimum Magery level as a prerequisite.
      source: B-66
      tags: [magic]
  skills:
    - name: Stealth
      attribute: DX
      difficulty: A
      source: B-222
      situationalModifiers:
        - name: Vs. blind opponent
          modifier: 4
          description: Apply when target cannot see.
        - name: Crowded street
          modifier: 2
    - name: Acrobatics
      attribute: DX
      difficulty: H
      source: B-174
    - name: First Aid
      attribute: IQ
      difficulty: E
      techLevel: 5
      source: B-195
      defaultSpecialization: Human
    - name: Riding
      attribute: DX
      difficulty: A
      source: B-217
      defaultSpecialization: Equine
  spells:
    - name: Light
      college: Light & Darkness
      difficulty: H
      baseEnergyCost: 1
      maintenanceCost: 1
      castingTime: 1 second
      duration: 1 minute
      description: |
        Produces a small, mobile light like a torch.  The classic first
        spell: at skill 15+ the 1-point cost is discounted to free.
      source: M-110
    - name: Ignite Fire
      college: Fire
      difficulty: H
      baseEnergyCost: 1
      castingTime: 1 second
      duration: 1 second
      description: |
        Makes an inflammable object burst into flame.  Cost varies with
        the size of the fire (1-4); record the base and adjust the
        energy to spend when casting.
      source: M-72
    - name: Minor Healing
      college: Healing
      difficulty: H
      baseEnergyCost: 1
      castingTime: 1 second
      prerequisites: Lend Vitality
      description: |
        Restores up to 3 HP to a subject you touch; cost equals the HP
        restored (1-3).
      source: M-91
    - name: Major Healing
      college: Healing
      difficulty: VH
      baseEnergyCost: 2
      castingTime: 1 second
      prerequisites: Magery 1, Minor Healing
      description: |
        Restores 2 HP per energy point spent (max 8 HP).  Very Hard --
        one skill level lower than a Hard spell for the same points.
      source: M-91
  items:
    - name: Mail Hauberk
      category: armor
      weightLbs: 25
      cost: 230
      description: Heavy chain hauberk covering the torso and shoulders.
      source: LT-110
      isArmor: true
      armor:
        locations: [torso]
        dr: 4
        drCrushing: 2
        flexible: true
        notes: Counts as flexible armor for blunt-trauma rules.
    - name: Steel Breastplate
      category: armor
      weightLbs: 18
      cost: 700
      description: Front-only steel breastplate, often worn over mail.
      source: LT-110
      isArmor: true
      armor:
        locations: [torso]
        dr: 5
        flexible: false
        frontOnly: true
    - name: Backpack
      category: general
      weightLbs: 3
      cost: 60
      description: Sturdy backpack worn on the shoulders.  20 lb capacity.
      source: B-288
    - name: Broadsword
      category: weapon
      weightLbs: 3
      cost: 500
      description: A sturdy steel cut-and-thrust sword.
      source: B-271
      weaponData:
        damage: sw+1 cut / thr+1 cr
        reach: '1'
        parry: '0'
        stRequired: 10
    - name: Powerstone (uncharged)
      category: magic
      weightLbs: 0
      cost: 100
      description: |
        A magical gem that stores castable energy.  Note its capacity
        (the powerstone spell determines max energy at creation).  In
        play, set the current charge in the item's powerstone metadata
        and burn down energy when casting.  Recharges at 1 point per
        day in a normal-mana area.
      source: M-69
