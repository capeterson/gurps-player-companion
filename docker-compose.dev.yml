services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gurps
      POSTGRES_PASSWORD: gurps
      POSTGRES_DB: gurps
    ports:
      - '5432:5432'
    volumes:
      - db_data_dev:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gurps -d gurps']
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: oven/bun:1.1-alpine
    working_dir: /app
    restart: 'no'
    command:
      - sh
      - -c
      - 'bun install --frozen-lockfile || bun install; bun run db:migrate'
    environment:
      DATABASE_URL: postgres://gurps:gurps@db:5432/gurps
      JWT_SECRET: dev-only-secret-replace-me-replace-me-replace-me
    volumes:
      - ./:/app
      - bun_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  app:
    image: oven/bun:1.1-alpine
    working_dir: /app
    command: ['bun', 'run', 'dev']
    environment:
      ENVIRONMENT: development
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://gurps:gurps@db:5432/gurps
      JWT_SECRET: dev-only-secret-replace-me-replace-me-replace-me
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 14
      CORS_ORIGINS: '[]'
    volumes:
      - ./:/app
      - bun_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - '3000:3000'

volumes:
  db_data_dev:
  bun_modules:
