# GURPS Player Companion — Unraid production compose
#
# Pulls a prebuilt image from GHCR (published by .github/workflows/publish-image.yml).
# No source on the server, no on-server build, no `context:` paths to get wrong.
#
# Setup (run once, from the project folder this file lives in):
#   1. mkdir -p /mnt/user/appdata/gurps-companion/postgres
#   2. echo "JWT_SECRET=$(openssl rand -hex 32)" > .env
#      (optional, in same .env: TAG=v0.1.0, HOST_PORT=3030, CORS_ORIGINS=["https://your.domain"])
#   3. docker compose -f docker-compose.unraid.yml pull
#   4. docker compose -f docker-compose.unraid.yml up -d
#
# Postgres password:
#   Default is `gurps`. To override, set POSTGRES_PASSWORD in .env using
#   URL-safe characters only (alphanumerics and `-._~`). The simplest
#   strong choice is `openssl rand -hex 32` — hex output is always URL-safe.
#   If you must use a password containing URI-reserved characters
#   (@ : / ? # [ ] %), set POSTGRES_PASSWORD to the raw value AND set
#   DATABASE_URL to a hand-crafted URI with the password percent-encoded,
#   e.g. DATABASE_URL=postgres://gurps:p%40ss@db:5432/gurps
#
# Update:  docker compose -f docker-compose.unraid.yml pull \
#       && docker compose -f docker-compose.unraid.yml up -d
# Logs:    docker logs -f gurps-app
#
# When running under the Compose Manager plugin, copy this file into the
# project folder as `compose.yml` so the plugin's Up/Pull buttons just work.
#
# Upgrading from a pre-PG18 layout:
#   Earlier versions of this file mounted /mnt/user/appdata/gurps-companion/db
#   at /var/lib/postgresql/data. Postgres 18 refuses that layout (PGDATA now
#   lives under /var/lib/postgresql/<MAJOR>/docker), so the host path moved to
#   .../postgres and the mount target moved up one level. Stale data at the
#   old `.../db` path is left untouched on disk — it is NOT auto-migrated.
#   - Aborted/empty PG18 init: `rm -rf /mnt/user/appdata/gurps-companion/db`.
#   - Real PG17 (or older) data: run `pg_upgrade --link` against a transient
#     17+18 image pair before pulling this compose, or dump+restore. See
#     https://www.postgresql.org/docs/18/pgupgrade.html.

services:
  db:
    image: postgres:18-alpine
    container_name: gurps-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gurps
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gurps}
      POSTGRES_DB: gurps
    volumes:
      # Postgres 18 expects the mount at the parent dir; data lives under
      # /var/lib/postgresql/<MAJOR>/docker so pg_upgrade --link works across
      # major-version bumps without crossing mount boundaries.
      - /mnt/user/appdata/gurps-companion/postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gurps -d gurps']
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ghcr.io/capeterson/gurps-player-companion:${TAG:-latest}
    container_name: gurps-migrate
    restart: 'no'
    command: ['bun', 'run', 'dist/server/migrate.js']
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://gurps:${POSTGRES_PASSWORD:-gurps}@db:5432/gurps}
      # Migrate shares the server config loader, which validates JWT_SECRET
      # even though migrations don't use it. Pass it through.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required for prod compose; generate with `openssl rand -hex 32`}
    depends_on:
      db:
        condition: service_healthy

  app:
    image: ghcr.io/capeterson/gurps-player-companion:${TAG:-latest}
    container_name: gurps-app
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-postgres://gurps:${POSTGRES_PASSWORD:-gurps}@db:5432/gurps}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required for prod compose; generate with `openssl rand -hex 32`}
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 14
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - '${HOST_PORT:-3030}:3000'
